name: Nightly Production Smoke Test

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  smoke-test:
    name: Run Production Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SMOKE_BASE_URL: ${{ vars.PROD_SMOKE_BASE_URL != '' && vars.PROD_SMOKE_BASE_URL || 'https://cheramandalam-finance.onrender.com' }}
      ADMIN_EMAIL: ${{ secrets.PROD_SMOKE_ADMIN_EMAIL }}
      ADMIN_PASSWORD: ${{ secrets.PROD_SMOKE_ADMIN_PASSWORD }}
      FIREBASE_WEB_API_KEY: ${{ vars.PROD_SMOKE_FIREBASE_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Validate smoke-test credentials
        shell: bash
        run: |
          if [ -z "$ADMIN_EMAIL" ] || [ -z "$ADMIN_PASSWORD" ]; then
            echo "::error::Missing repository secrets PROD_SMOKE_ADMIN_EMAIL or PROD_SMOKE_ADMIN_PASSWORD"
            exit 1
          fi

      - name: Run smoke test
        shell: bash
        run: |
          npm --prefix backend run smoke-test | tee smoke-test.log

      - name: Upload smoke-test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-smoke-test-log
          path: smoke-test.log
          if-no-files-found: ignore

  alert-on-failure:
    name: Raise Alert Issue
    needs: smoke-test
    if: failure()
    runs-on: ubuntu-latest

    steps:
      - name: Create or update failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = '[Alert] Nightly production smoke test failed';
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const now = new Date().toISOString();

            const issues = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100
            });

            const existing = issues.data.find((issue) => issue.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: `Nightly smoke test failed again at ${now}.\n\nWorkflow run: ${runUrl}`
              });
              core.info(`Updated existing alert issue #${existing.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title,
                body: `Nightly smoke test failed at ${now}.\n\nWorkflow run: ${runUrl}\n\nPlease investigate backend health, auth, and dependent services.`
              });
              core.info(`Created alert issue #${created.data.number}`);
            }
