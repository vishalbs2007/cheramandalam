name: CI

on:
  push:
  workflow_dispatch:

jobs:
  backend-tests:
    name: Backend Preflight and Smoke Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: finance_chit_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12

    env:
      NODE_ENV: test
      PORT: 5000
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: finance_chit_ci
      DB_POOL_SIZE: 10
      DB_CONNECT_TIMEOUT_MS: 10000
      JWT_SECRET: ci_jwt_secret_at_least_32_characters_long
      JWT_EXPIRES_IN: 7d
      ADMIN_EMAIL: admin@finance.com
      ADMIN_PASSWORD: Admin@123!
      BUSINESS_NAME: CI Finance and Chit
      FRONTEND_ORIGIN: http://localhost:5173
      REQUEST_BODY_LIMIT: 1mb
      API_RATE_LIMIT_WINDOW_MS: 900000
      API_RATE_LIMIT_MAX: 600
      AUTH_RATE_LIMIT_WINDOW_MS: 900000
      AUTH_RATE_LIMIT_MAX: 50
      ENABLE_HTTP_LOGGING: false
      AUTO_INIT_DB: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Run backend preflight
        run: npm --prefix backend run preflight

      - name: Initialize DB
        run: npm --prefix backend run init-db

      - name: Start backend
        run: npm --prefix backend start > backend.log 2>&1 &

      - name: Wait for backend health
        run: |
          for i in {1..40}; do
            if curl -fsS http://localhost:5000/health >/dev/null; then
              echo "Backend is healthy"
              exit 0
            fi
            sleep 2
          done

          echo "Backend failed to start in time"
          cat backend.log || true
          exit 1

      - name: Run smoke test
        run: npm --prefix backend run smoke-test

      - name: Show backend logs on failure
        if: failure()
        run: cat backend.log || true

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build frontend
        run: npm --prefix frontend run build
